version: "3.9"

services:
  # ─── Data Stores ────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: regulatorai-postgres
    user: "999:999"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  redis:
    image: redis:7-alpine
    container_name: regulatorai-redis
    user: "999:999"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: regulatorai-elasticsearch
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTICSEARCH_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  # ─── Backend Services ───────────────────────────────────
  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    container_name: regulatorai-gateway
    user: "1000:1000"
    ports:
      - "${GATEWAY_PORT}:8000"
    env_file: .env
    read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    container_name: regulatorai-ingestion
    user: "1000:1000"
    env_file: .env
    read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  agent-service:
    build:
      context: .
      dockerfile: services/agent-service/Dockerfile
    container_name: regulatorai-agent
    user: "1000:1000"
    env_file: .env
    read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  compliance-service:
    build:
      context: .
      dockerfile: services/compliance-service/Dockerfile
    container_name: regulatorai-compliance
    user: "1000:1000"
    env_file: .env
    read_only: true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    container_name: regulatorai-search
    user: "1000:1000"
    env_file: .env
    read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: regulatorai-notification
    user: "1000:1000"
    env_file: .env
    read_only: true
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  # ─── Celery Worker ──────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    container_name: regulatorai-celery
    user: "1000:1000"
    command: celery -A src.tasks worker --loglevel=info --concurrency=4
    env_file: .env
    read_only: true
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.tasks inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  celery-beat:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    container_name: regulatorai-celery-beat
    user: "1000:1000"
    command: celery -A src.tasks beat --loglevel=info
    env_file: .env
    read_only: true
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  # ─── Frontend ───────────────────────────────────────────
  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: regulatorai-dashboard
    read_only: true
    environment:
      - REACT_APP_API_URL=http://localhost:${GATEWAY_PORT}
    depends_on:
      - gateway-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    networks:
      - regulatorai-net

  # ─── Monitoring ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: regulatorai-prometheus
    user: "65534:65534"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: regulatorai-grafana
    user: "472:472"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - regulatorai-net

volumes:
  postgres_data:
  redis_data:
  es_data:
  prometheus_data:
  grafana_data:

networks:
  regulatorai-net:
    driver: bridge
