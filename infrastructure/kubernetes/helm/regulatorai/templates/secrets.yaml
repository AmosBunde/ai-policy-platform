apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "regulatorai.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.externalSecrets.databaseUrl | default "postgresql+asyncpg://regulatorai:changeme@postgres:5432/regulatorai" | quote }}
  REDIS_URL: {{ .Values.externalSecrets.redisUrl | default "redis://:changeme@redis:6379/0" | quote }}
  ELASTICSEARCH_URL: {{ .Values.externalSecrets.elasticsearchUrl | default "http://elasticsearch:9200" | quote }}
  JWT_SECRET: {{ .Values.externalSecrets.jwtSecret | default "change-this-to-a-secure-random-string-at-least-32-chars" | quote }}
  OPENAI_API_KEY: {{ .Values.externalSecrets.openaiApiKey | default "sk-placeholder" | quote }}
