{{- $root := . -}}

{{- /* ── Service definitions ─────────────────────────────── */ -}}
{{- $services := list
  (dict "name" "gateway"      "values" .Values.gateway      "port" 8000 "hasSecretVolume" true)
  (dict "name" "ingestion"    "values" .Values.ingestion    "port" 8001 "hasSecretVolume" true)
  (dict "name" "agent"        "values" .Values.agent        "port" 8002 "hasSecretVolume" true)
  (dict "name" "compliance"   "values" .Values.compliance   "port" 8003 "hasSecretVolume" true)
  (dict "name" "search"       "values" .Values.search       "port" 8004 "hasSecretVolume" true)
  (dict "name" "notification" "values" .Values.notification "port" 8005 "hasSecretVolume" true)
  (dict "name" "dashboard"    "values" .Values.dashboard    "port" 3000 "hasSecretVolume" false)
}}

{{- range $svc := $services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $root.Release.Name }}-{{ $svc.name }}
  labels:
    {{- include "regulatorai.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $svc.name }}
spec:
  replicas: {{ $svc.values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $root.Chart.Name }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app.kubernetes.io/component: {{ $svc.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $root.Chart.Name }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/component: {{ $svc.name }}
    spec:
      securityContext:
        {{- include "regulatorai.podSecurityContext" $root | nindent 8 }}
      containers:
        - name: {{ $svc.name }}
          image: {{ include "regulatorai.image" (dict "global" $root.Values.global "image" $svc.values.image) }}
          imagePullPolicy: {{ $svc.values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          securityContext:
            {{- include "regulatorai.containerSecurityContext" $root | nindent 12 }}
          resources:
            {{- toYaml $svc.values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ $root.Release.Name }}-config
          {{- if $svc.hasSecretVolume }}
          volumeMounts:
            - name: secrets
              mountPath: /etc/regulatorai/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Release.Name }}-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Release.Name }}-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Release.Name }}-secrets
                  key: JWT_SECRET
            {{- if eq $svc.name "search" }}
            - name: ELASTICSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Release.Name }}-secrets
                  key: ELASTICSEARCH_URL
            {{- end }}
            {{- if eq $svc.name "agent" }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $root.Release.Name }}-secrets
                  key: OPENAI_API_KEY
            {{- end }}
          {{- else }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        {{- if $svc.hasSecretVolume }}
        - name: secrets
          secret:
            secretName: {{ $root.Release.Name }}-secrets
        {{- end }}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
{{- end }}

---
# ── Celery Worker ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-celery-worker
  labels:
    {{- include "regulatorai.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-worker
spec:
  replicas: {{ .Values.celeryWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: celery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: celery-worker
    spec:
      securityContext:
        {{- include "regulatorai.podSecurityContext" . | nindent 8 }}
      containers:
        - name: celery-worker
          image: {{ include "regulatorai.image" (dict "global" .Values.global "image" .Values.celeryWorker.image) }}
          imagePullPolicy: {{ .Values.celeryWorker.image.pullPolicy }}
          command: {{ toJson .Values.celeryWorker.command }}
          securityContext:
            {{- include "regulatorai.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.celeryWorker.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: REDIS_URL
          volumeMounts:
            - name: secrets
              mountPath: /etc/regulatorai/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: secrets
          secret:
            secretName: {{ .Release.Name }}-secrets
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi

