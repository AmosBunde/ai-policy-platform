groups:
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: >
          (rate(http_requests_total{status=~"5.."}[5m])
          / rate(http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.job }}."

      - alert: HighLatencyP99
        expr: >
          histogram_quantile(0.99,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.job }}"
          description: "99th percentile latency is {{ $value }}s on {{ $labels.job }}."

  - name: resource_usage
    rules:
      - alert: HighTokenUsage
        expr: rate(llm_tokens_total[1h]) > 100000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High LLM token usage"
          description: "Token consumption rate is {{ $value }} tokens/hour."

  - name: security
    rules:
      - alert: BruteForceDetected
        expr: rate(auth_failures_total[1m]) > 20
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Possible brute force attack detected"
          description: "Auth failure rate is {{ $value }}/min, exceeding threshold of 20/min."

      - alert: HighRateLimitHits
        expr: rate(rate_limit_hits_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High rate of rate-limited requests"
          description: "Rate limit hit rate is {{ $value }}/s."
