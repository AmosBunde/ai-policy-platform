global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway-service:8000"]
    metrics_path: "/metrics"

  - job_name: "ingestion"
    static_configs:
      - targets: ["ingestion-service:8001"]
    metrics_path: "/metrics"

  - job_name: "agent"
    static_configs:
      - targets: ["agent-service:8002"]
    metrics_path: "/metrics"

  - job_name: "compliance"
    static_configs:
      - targets: ["compliance-service:8003"]
    metrics_path: "/metrics"

  - job_name: "search"
    static_configs:
      - targets: ["search-service:8004"]
    metrics_path: "/metrics"

  - job_name: "notification"
    static_configs:
      - targets: ["notification-service:8005"]
    metrics_path: "/metrics"
