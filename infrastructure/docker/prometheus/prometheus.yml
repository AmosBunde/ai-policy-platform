      - source_labels: [__address__]
        target_label: instance
        regex: "(.+):\\d+"
        replacement: "${1}"

  - job_name: "notification"
    static_configs:
      - targets: ["notification-service:8005"]
        labels:
          service: "notification"
          tier: "backend"
    metrics_path: "/metrics"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "(.+):\\d+"
        replacement: "${1}"
