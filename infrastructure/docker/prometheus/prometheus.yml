    metrics_path: "/metrics"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "(.+):\\d+"
        replacement: "${1}"

  - job_name: "search"
    static_configs:
      - targets: ["search-service:8004"]
        labels:
          service: "search"
          tier: "backend"
    metrics_path: "/metrics"
